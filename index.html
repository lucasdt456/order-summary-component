<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link href="./src/output.css" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Order summary card</title>
</head>
<body class="font-Red-Hat text-Blue-950 
  bg-Blue-100
  bg-[url(../assets/images/pattern-background-mobile.svg)]
  bg-no-repeat bg-contain 
  h-screen grid place-content-center
  sm:bg-[url(../assets/images/pattern-background-desktop.svg)]">
  <main>
    <div class="w-[327px]
  rounded-2xl overflow-hidden bg-white
  shadow-xl/20 text-center shadow-Blue-950/60 
  sm:w-[28.125rem]
  ">
      <div>
        <img src="./assets/images/illustration-hero.svg" alt="illustration-hero">
      </div>
      
      <div class="p-6 sm:p-12">
        <h1 class="font-black text-[1.375rem] mb-4
        sm:text-[1.75rem]">
          Order Summary
        </h1>

        <p class="text-Gray-600 mb-6 text-[0.9375rem] mx-2 font-bold">
          You can now listen to millions of songs, audiobooks, and podcasts on any
          device anywhere you like!
        </p>

        <div class="flex p-4 items-center 
        bg-Blue-50 rounded-[.6875rem]
        mb-6 sm:mb-8 sm:p-6">
          <img
          class="mr-5 " 
          src="./assets/images/icon-music.svg" alt="icon-music">
        
          <div class="">
            <p class="font-black text-sm sm:text-[16px]">
              Annual Plan
            </p>
            <p class="text-Gray-600 text-sm font-bold sm:text-[16px]">
              $59.99/year
            </p>
          </div>
        
          <a class="
          ml-auto text-[.8125rem] text-Blue-700 
          underline font-bold sm:text-[15px]
          cursor-pointer hover:text-Blue-700/80  hover:no-underline">
            Change
          </a>
        </div>

        <button class="bg-Blue-700 text-white font-black text-[0.9375rem]
        block w-full rounded-[.6875rem] p-4 mb-6 
        shadow-[0_20px_20px] shadow-Blue-700/20
        hover:bg-Blue-700/70 cursor-pointer"
        type="button">
            Proceed to Payment
        </button>
        
        <button class="font-black text-[.9375rem] text-Gray-600
        cursor-pointer hover:text-Blue-950">
            Cancel Order
        </button>
            </div>
      </div>

  </main>
  
</body>
</html>
